# AUTO-GENERATED — do not edit by hand.
# Edit src/modules/<module>/cms.config.yml and re-run scripts/merge-cms-config.ts

backend:
  name: github
  repo: your-github-user/your-repo
  branch: main
  base_url: https://api.netlify.com
  auth_endpoint: auth

publish_mode: editorial_workflow

media_folder: public/uploads
public_folder: /uploads

collections:
  - name: home
    label: Home
    files:
      - name: home
        label: Home Settings
        file: src/content/home/index.md
        fields:
          - { label: Tagline, name: tagline, widget: string, required: false }
          - { label: Bio, name: bio, widget: text, required: false, hint: "A short personal note shown on the home page" }

  - name: blog
    label: Blog
    folder: src/content/blog
    create: true
    path: "{{year}}/{{month}}/{{slug}}"
    slug: "{{slug}}"
    sortable_fields: ['date', 'title']
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: string, required: false }
      - label: Date
        name: date
        widget: datetime
        format: "YYYY-MM-DDTHH:mm:ssZ"
        date_format: "YYYY-MM-DD"
        time_format: "HH:mm"
        default: ""
        picker_utc: false
      - { label: Tags, name: tags, widget: list, default: [] }
      - { label: Cover Image, name: cover, widget: image, required: false }
      - { label: Body, name: body, widget: markdown }
  
  - name: blog-settings
    label: Blog Settings
    files:
      - name: blog-settings
        label: Blog Settings
        file: src/content/blog-meta/index.md
        fields:
          - { label: "Section title", name: title, widget: string, required: false, hint: "The personality hook e.g. So, I was thinking..." }
          - { label: "Section subtitle", name: subtitle, widget: string, required: false, hint: "The context line e.g. a blog by Greg Marine" }
          - { label: Section tagline, name: tagline, widget: string, required: false }

  - name: words
    label: Words
    folder: src/content/words
    create: true
    slug: "{{slug}}"
    sortable_fields: ['date', 'title']
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: string, required: false }
      - label: Date
        name: date
        widget: datetime
        format: "YYYY-MM-DDTHH:mm:ssZ"
        date_format: "YYYY-MM-DD"
        time_format: "HH:mm"
        default: ""
        picker_utc: false
      - { label: Tags, name: tags, widget: list, default: [] }
      - { label: Form, name: form, widget: select, required: false, options: [poem, essay, prose, story, other] }
      - { label: Body, name: body, widget: markdown }
  
  - name: words-settings
    label: Words Settings
    files:
      - name: words-settings
        label: Words Settings
        file: src/content/words-meta/index.md
        fields:
          - { label: "Section title", name: title, widget: string, required: false, hint: "The personality hook e.g. So, I wrote something..." }
          - { label: "Section subtitle", name: subtitle, widget: string, required: false, hint: "The context line e.g. a collection of writings by Greg Marine" }
          - { label: Section tagline, name: tagline, widget: string, required: false }

  - name: art
    label: Art
    folder: src/content/art
    create: true
    slug: "{{slug}}"
    sortable_fields: ['date', 'title']
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: string, required: false }
      - label: Date
        name: date
        widget: datetime
        format: "YYYY-MM-DDTHH:mm:ssZ"
        date_format: "YYYY-MM-DD"
        time_format: "HH:mm"
        default: ""
        picker_utc: false
      - { label: Tags, name: tags, widget: list, default: [] }
      - label: Images
        name: images
        widget: list
        fields:
          - { label: Image, name: src, widget: image }
          - { label: Caption, name: caption, widget: string, required: false }
      - { label: Medium, name: medium, widget: string, required: false }
      - { label: Year Created, name: yearCreated, widget: number, required: false }
      - { label: Body, name: body, widget: markdown, required: false }
  
  - name: art-settings
    label: Art Settings
    files:
      - name: art-settings
        label: Art Settings
        file: src/content/art-meta/index.md
        fields:
          - { label: "Section title", name: title, widget: string, required: false, hint: "The personality hook e.g. So, I made a painting..." }
          - { label: "Section subtitle", name: subtitle, widget: string, required: false, hint: "The context line e.g. an art gallery by Greg Marine" }
          - { label: Section tagline, name: tagline, widget: string, required: false }

  - name: photos
    label: Photos
    folder: src/content/photos
    create: true
    slug: "{{slug}}"
    sortable_fields: ['date', 'title']
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: string, required: false }
      - label: Date
        name: date
        widget: datetime
        format: "YYYY-MM-DDTHH:mm:ssZ"
        date_format: "YYYY-MM-DD"
        time_format: "HH:mm"
        default: ""
        picker_utc: false
      - label: Date Taken
        name: dateTaken
        widget: datetime
        format: "YYYY-MM-DDTHH:mm:ssZ"
        date_format: "YYYY-MM-DD"
        time_format: "HH:mm"
        default: ""
        picker_utc: false
        required: false
      - { label: Location, name: location, widget: string, required: false }
      - { label: Tags, name: tags, widget: list, default: [] }
      - label: Images
        name: images
        widget: list
        fields:
          - { label: Image, name: src, widget: image }
          - { label: Caption, name: caption, widget: string, required: false }
      - { label: Body, name: body, widget: markdown, required: false }
  
  - name: photos-settings
    label: Photos Settings
    files:
      - name: photos-settings
        label: Photos Settings
        file: src/content/photos-meta/index.md
        fields:
          - { label: "Section title", name: title, widget: string, required: false, hint: "The personality hook e.g. So, I took a photo..." }
          - { label: "Section subtitle", name: subtitle, widget: string, required: false, hint: "The context line e.g. a photo gallery by Greg Marine" }
          - { label: Section tagline, name: tagline, widget: string, required: false }
