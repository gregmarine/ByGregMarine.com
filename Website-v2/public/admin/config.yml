# AUTO-GENERATED — do not edit by hand.
# Edit src/modules/<module>/cms.config.yml and re-run scripts/merge-cms-config.ts

backend:
  name: github
  repo: your-github-user/your-repo
  branch: main

publish_mode: editorial_workflow

media_folder: public/uploads
public_folder: /uploads

collections:
  - name: blog
    label: Blog
    folder: src/content/blog
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: string, required: false }
      - label: Date
        name: date
        widget: datetime
        format: "YYYY-MM-DDTHH:mm:ssZ"
        date_format: "YYYY-MM-DD"
        time_format: "HH:mm"
        default: ""
        picker_utc: false
      - { label: Tags, name: tags, widget: list, default: [] }
      - { label: Cover Image, name: cover, widget: image, required: false }
      - { label: Body, name: body, widget: markdown }

  - name: photos
    label: Photos
    folder: src/content/photos
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: string, required: false }
      - label: Date
        name: date
        widget: datetime
        format: "YYYY-MM-DDTHH:mm:ssZ"
        date_format: "YYYY-MM-DD"
        time_format: "HH:mm"
        default: ""
        picker_utc: false
      - label: Date Taken
        name: dateTaken
        widget: datetime
        format: "YYYY-MM-DDTHH:mm:ssZ"
        date_format: "YYYY-MM-DD"
        time_format: "HH:mm"
        default: ""
        picker_utc: false
        required: false
      - { label: Location, name: location, widget: string, required: false }
      - { label: Tags, name: tags, widget: list, default: [] }
      - label: Images
        name: images
        widget: list
        fields:
          - { label: Image, name: src, widget: image }
          - { label: Caption, name: caption, widget: string, required: false }
      - { label: Body, name: body, widget: markdown, required: false }

  - name: art
    label: Art
    folder: src/content/art
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: string, required: false }
      - label: Date
        name: date
        widget: datetime
        format: "YYYY-MM-DDTHH:mm:ssZ"
        date_format: "YYYY-MM-DD"
        time_format: "HH:mm"
        default: ""
        picker_utc: false
      - { label: Tags, name: tags, widget: list, default: [] }
      - label: Images
        name: images
        widget: list
        fields:
          - { label: Image, name: src, widget: image }
          - { label: Caption, name: caption, widget: string, required: false }
      - { label: Medium, name: medium, widget: string, required: false }
      - { label: Year Created, name: yearCreated, widget: number, required: false }
      - { label: Body, name: body, widget: markdown, required: false }

  - name: words
    label: Words
    folder: src/content/words
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: string, required: false }
      - label: Date
        name: date
        widget: datetime
        format: "YYYY-MM-DDTHH:mm:ssZ"
        date_format: "YYYY-MM-DD"
        time_format: "HH:mm"
        default: ""
        picker_utc: false
      - { label: Tags, name: tags, widget: list, default: [] }
      - { label: Form, name: form, widget: select, required: false, options: [poem, essay, prose, story, other] }
      - { label: Body, name: body, widget: markdown }
