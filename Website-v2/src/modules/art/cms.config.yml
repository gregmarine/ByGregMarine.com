# Decap CMS config fragment — Art module
- name: art
  label: Art
  folder: src/content/art
  create: true
  slug: "{{slug}}"
  preview_path: "art/{{slug}}"
  sortable_fields: ['date', 'title']
  fields:
    - { label: Title, name: title, widget: string }
    - { label: Description, name: description, widget: string, required: false }
    - label: Date
      name: date
      widget: datetime
      format: "YYYY-MM-DDTHH:mm:ssZ"
      date_format: "YYYY-MM-DD"
      time_format: "HH:mm"
      default: ""
      picker_utc: false
    - { label: Tags, name: tags, widget: list, default: [] }
    - label: Images
      name: images
      widget: list
      fields:
        - { label: Image, name: src, widget: image }
        - { label: Caption, name: caption, widget: string, required: false }
    - label: Medium
      name: medium
      widget: select
      multiple: true
      required: false
      options:
        - Watercolor on Canvas
        - Acrylic on Canvas
        - Oil on Canvas
        - Gouache
        - Pastel
        - Ink
        - Charcoal
        - Pencil
        - Watercolor on Paper
        - Digital Painting
        - Pixel Art
        - Generative Art
        - Mixed Media
        - Mixed Media Digital
        - Photography
    - label: Style
      name: style
      widget: select
      multiple: true
      required: false
      options:
        - Realism
        - Photorealism
        - Hyperrealism
        - Naturalism
        - Plein Air
        - Impressionism
        - Post-Impressionism
        - Neo-Impressionism
        - Pointillism
        - Expressionism
        - Abstract Expressionism
        - Abstract
        - Geometric Abstract
        - Minimalism
        - Color Field
        - Art Nouveau
        - Art Deco
        - Folk Art
        - Naive Art
        - Outsider Art
        - Decorative
        - Illustrative
        - Concept Art
        - Surrealism
        - Fantasy
        - Whimsy
    - label: Subject
      name: subject
      widget: select
      multiple: true
      required: false
      options:
        - Landscape
        - Seascape
        - Portrait
        - Figurative
        - Still Life
        - Abstract
        - Animals
        - Architecture
        - Nature
        - Urban
        - Narrative
        - Fantasy
    - { label: Dimensions, name: dimensions, widget: string, required: false, hint: "e.g. 4×4, 5×7, 11×14" }
    - { label: Year Created, name: yearCreated, widget: number, required: false }
    - { label: Collection, name: collection, widget: string, required: false, hint: "Optional. Group this piece under a named collection." }
    - { label: Body, name: body, widget: markdown, required: false }

- name: art-settings
  label: Art Settings
  files:
    - name: art-settings
      label: Art Settings
      file: src/content/art-meta/index.md
      fields:
        - { label: "Section title", name: title, widget: string, required: false, hint: "The personality hook e.g. So, I made a painting..." }
        - { label: "Section subtitle", name: subtitle, widget: string, required: false, hint: "The context line e.g. an art gallery by Greg Marine" }
        - { label: Section tagline, name: tagline, widget: string, required: false }
