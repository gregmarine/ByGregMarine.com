# Decap CMS config fragment — Writings module
- name: writings
  label: Writings
  folder: src/content/writings
  create: true
  slug: "{{slug}}"
  preview_path: "writings/{{slug}}"
  sortable_fields: ['date', 'title']
  fields:
    - { label: Title, name: title, widget: string }
    - { label: Subtitle, name: subtitle, widget: string, required: false }
    - { label: Description, name: description, widget: string, required: false }
    - label: Date
      name: date
      widget: datetime
      format: "YYYY-MM-DDTHH:mm:ssZ"
      date_format: "YYYY-MM-DD"
      time_format: "HH:mm"
      default: ""
      picker_utc: false
    - { label: Tags, name: tags, widget: list, default: [] }
    - { label: Form, name: form, widget: select, required: false, options: [poem, essay, prose, story, book, other] }
    - { label: Collection, name: collection, widget: string, required: false, hint: "Optional. Group this entry under a named collection." }
    - { label: Cover Image, name: cover, widget: image, required: false }
    - { label: Order, name: order, widget: number, required: false, hint: "Used for sequential content like book chapters. Use 0 for the collection landing page (cover entry). Use 1, 2, 3... for chapters. Leave blank for standalone writings." }
    - { label: Body, name: body, widget: markdown }

- name: writings-settings
  label: Writings Settings
  files:
    - name: writings-settings
      label: Writings Settings
      file: src/content/writings-meta/index.md
      fields:
        - { label: "Section title", name: title, widget: string, required: false, hint: "The personality hook e.g. So, I wrote something..." }
        - { label: "Section subtitle", name: subtitle, widget: string, required: false, hint: "The context line e.g. a collection of writings by Greg Marine" }
        - { label: Section tagline, name: tagline, widget: string, required: false }
